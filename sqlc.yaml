version: '2'
sql:
  - engine: 'postgresql'
    schema: 'migrations'
    queries:
      - 'pkg/repository/queries/user'
      - 'pkg/repository/queries/character'
      - 'pkg/repository/queries/note'
      - 'pkg/repository/queries/characteristics'
      - 'pkg/repository/queries/healthState'
    gen:
      go:
        package: 'db'
        out: 'pkg/repository/db'
        sql_package: 'pgx/v5'
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_empty_slices: true
